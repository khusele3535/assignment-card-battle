name: Card Battle Auto-Grader (40% — Code correctness)

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  grade:
    runs-on: ubuntu-latest
    name: Grade Card Battle submission

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download JUnit
        run: |
          mkdir -p lib
          curl -sL "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar" -o lib/junit-platform-console-standalone-1.10.2.jar

      # ─── Compile ───
      - name: "Compile: src/ (recursive)"
        id: compile_src
        continue-on-error: true
        run: |
          mkdir -p build/card-battle
          SRC_FILES=$(find src -name '*.java' 2>/dev/null)
          if [ -z "$SRC_FILES" ]; then
            echo "::warning::src/-д .java файл байхгүй байна"
            # Тестийг хэвийн compile хийх боломжтой байхаар хоосон build dir үлдээнэ
            exit 0
          fi
          javac -d build/card-battle $SRC_FILES

      - name: "Compile: CardBattleTest"
        id: compile_test
        if: steps.compile_src.outcome == 'success'
        continue-on-error: true
        run: |
          javac -cp build/card-battle:lib/junit-platform-console-standalone-1.10.2.jar \
                -d build/card-battle tests/CardBattleTest.java

      # ─── Run by tag ───
      - name: "Test: core"
        id: test_core
        if: steps.compile_test.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar lib/junit-platform-console-standalone-1.10.2.jar \
            --class-path build/card-battle \
            --select-class CardBattleTest \
            --include-tag core \
            --disable-ansi-colors 2>&1 | tee build/card-battle/core_output.txt

      - name: "Test: stretch"
        id: test_stretch
        if: steps.compile_test.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar lib/junit-platform-console-standalone-1.10.2.jar \
            --class-path build/card-battle \
            --select-class CardBattleTest \
            --include-tag stretch \
            --disable-ansi-colors 2>&1 | tee build/card-battle/stretch_output.txt

      - name: "Test: bonus"
        id: test_bonus
        if: steps.compile_test.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar lib/junit-platform-console-standalone-1.10.2.jar \
            --class-path build/card-battle \
            --select-class CardBattleTest \
            --include-tag bonus \
            --disable-ansi-colors 2>&1 | tee build/card-battle/bonus_output.txt

      # ─── AI Detection (бүх src .java файлыг нэгтгэн) ───
      - name: "AI Detect: combined src/"
        id: ai_detect
        continue-on-error: true
        run: |
          mkdir -p build/card-battle
          SRC_FILES=$(find src -name '*.java' 2>/dev/null)
          if [ -z "$SRC_FILES" ]; then
            echo '{"file":"src","score":0,"level":"LOW","checks":[]}' > build/card-battle/ai_report.json
            exit 0
          fi
          TMP_COMBINED=$(mktemp --suffix=.java)
          for f in $SRC_FILES; do
            cat "$f" >> "$TMP_COMBINED"
            echo "" >> "$TMP_COMBINED"
          done
          python3 scripts/ai_detector.py "$TMP_COMBINED" --json \
            > build/card-battle/ai_report.json 2>&1 || true
          rm -f "$TMP_COMBINED"
          cat build/card-battle/ai_report.json

      # ─── Compute score & build summary ───
      - name: "Compute score"
        id: score
        if: always()
        run: |
          parse_tier() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "0 0"; return
            fi
            local p t f
            p=$(grep -oE '[0-9]+ tests successful' "$file" | grep -oE '[0-9]+' | head -1)
            f=$(grep -oE '[0-9]+ tests failed' "$file" | grep -oE '[0-9]+' | head -1)
            p=${p:-0}
            f=${f:-0}
            t=$((p + f))
            echo "$p $t"
          }

          read CORE_P CORE_T < <(parse_tier "build/card-battle/core_output.txt")
          read STRETCH_P STRETCH_T < <(parse_tier "build/card-battle/stretch_output.txt")
          read BONUS_P BONUS_T < <(parse_tier "build/card-battle/bonus_output.txt")

          # Auto-grade = 40% of total. Core=24, Stretch=12, Bonus=4.
          CORE_PTS=$(awk -v p="$CORE_P" -v t="$CORE_T" 'BEGIN{ if(t>0) printf "%.1f",(p/t)*24; else print "0.0" }')
          STRETCH_PTS=$(awk -v p="$STRETCH_P" -v t="$STRETCH_T" 'BEGIN{ if(t>0) printf "%.1f",(p/t)*12; else print "0.0" }')
          BONUS_PTS=$(awk -v p="$BONUS_P" -v t="$BONUS_T" 'BEGIN{ if(t>0) printf "%.1f",(p/t)*4; else print "0.0" }')
          AUTO_TOTAL=$(awk -v a="$CORE_PTS" -v b="$STRETCH_PTS" -v c="$BONUS_PTS" 'BEGIN{ printf "%.1f", a+b+c }')

          AI_LEVEL="Unknown"
          AI_SCORE="?"
          AI_BADGE="❓ N/A"
          if [ -f "build/card-battle/ai_report.json" ]; then
            AI_LEVEL=$(python3 -c "import json; d=json.load(open('build/card-battle/ai_report.json')); print(d.get('level','?'))" 2>/dev/null || echo "?")
            AI_SCORE=$(python3 -c "import json; d=json.load(open('build/card-battle/ai_report.json')); print(d.get('score','?'))" 2>/dev/null || echo "?")
            case "$AI_LEVEL" in
              LOW) AI_BADGE="✅ LOW ($AI_SCORE)" ;;
              MEDIUM) AI_BADGE="⚠️ MEDIUM ($AI_SCORE)" ;;
              HIGH) AI_BADGE="🚨 HIGH ($AI_SCORE)" ;;
            esac
          fi

          COMPILE_STATUS="✅ OK"
          if [ "${{ steps.compile_src.outcome }}" != "success" ]; then
            COMPILE_STATUS="❌ Source Compile Error"
          elif [ "${{ steps.compile_test.outcome }}" != "success" ]; then
            COMPILE_STATUS="❌ Test Compile Error"
          fi

          {
            echo "CORE_P=$CORE_P"
            echo "CORE_T=$CORE_T"
            echo "STRETCH_P=$STRETCH_P"
            echo "STRETCH_T=$STRETCH_T"
            echo "BONUS_P=$BONUS_P"
            echo "BONUS_T=$BONUS_T"
            echo "CORE_PTS=$CORE_PTS"
            echo "STRETCH_PTS=$STRETCH_PTS"
            echo "BONUS_PTS=$BONUS_PTS"
            echo "AUTO_TOTAL=$AUTO_TOTAL"
            echo "AI_BADGE=$AI_BADGE"
            echo "AI_LEVEL=$AI_LEVEL"
            echo "COMPILE_STATUS=$COMPILE_STATUS"
          } >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🎴 Card Battle — Auto-Grade (40% of total)

          **Compile:** $COMPILE_STATUS

          | Tier | Tests | Points |
          |------|-------|--------|
          | 🟢 Core | $CORE_P / $CORE_T | **$CORE_PTS / 24** |
          | 🟡 Stretch | $STRETCH_P / $STRETCH_T | **$STRETCH_PTS / 12** |
          | 🔴 Bonus | $BONUS_P / $BONUS_T | **$BONUS_PTS / 4** |
          | **Auto-Grade** | | **$AUTO_TOTAL / 40** |

          **AI Detection:** $AI_BADGE

          ## 📝 Гараар шалгагдах хэсэг (60%)

          - 🎨 UI/UX quality (20 оноо) — wireframes, UX audit, user test report
          - ✨ Creativity & polish (15 оноо) — картны санаа, flavor, дизайн
          - 🧪 Дотоод тест (10 оноо) — таны өөрөө бичсэн тестүүд
          - 📐 Code quality (10 оноо) — нэрлэх, бүтэц, давтагдалгүй байх
          - 📚 Documentation (5 оноо) — dev-log, commit message, readme

          ---
          *Auto-graded on $(date '+%Y-%m-%d %H:%M UTC')*
          EOF

      # ─── Post PR comment ───
      - name: "Post grade comment to PR"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🎴 Card Battle — Auto-Grade

            > ⚠️ Энэ нь **нийт онооны 40%** — кодын бүтцийн шалгалт. Үлдэгдэл 60% нь **багш гараар** шалгана (UI/UX deliverables, creativity, testing, code quality, docs).

            **Compile:** ${{ steps.score.outputs.COMPILE_STATUS }}

            | Tier | Tests | Points |
            |------|-------|--------|
            | 🟢 Core | ${{ steps.score.outputs.CORE_P }} / ${{ steps.score.outputs.CORE_T }} | **${{ steps.score.outputs.CORE_PTS }} / 24** |
            | 🟡 Stretch | ${{ steps.score.outputs.STRETCH_P }} / ${{ steps.score.outputs.STRETCH_T }} | **${{ steps.score.outputs.STRETCH_PTS }} / 12** |
            | 🔴 Bonus | ${{ steps.score.outputs.BONUS_P }} / ${{ steps.score.outputs.BONUS_T }} | **${{ steps.score.outputs.BONUS_PTS }} / 4** |
            | **Auto-Grade** | | **${{ steps.score.outputs.AUTO_TOTAL }} / 40** |

            **AI Detection:** ${{ steps.score.outputs.AI_BADGE }}

            ### 📝 Manual review (pending — багш)

            - [ ] 🖼️ Wireframes (10 оноо) — \`docs/wireframes/\` хавтас шалгана
            - [ ] 👥 Персона (5 оноо) — \`docs/personas/README.md\`
            - [ ] ✍️ UX writing audit (5 оноо) — \`docs/ux-audit/README.md\`
            - [ ] 🧪 User test report (5 оноо) — \`docs/user-test-report/README.md\`
            - [ ] ✨ Creativity & polish (15 оноо)
            - [ ] 🧪 Өөрийн тест (10 оноо)
            - [ ] 📐 Code quality (10 оноо)
            - [ ] 📚 Dev log + docs (5 оноо)

            ---
            _Шинэ commit push хийвэл тест дахин ажиллана._`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
